<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>日本語試験 受験意思確認</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#1f2430; --sub:#6b7280;
    --line:#e3e6ec; --brand:#1f6feb; --brand-d:#155ac4; --ok:#0f9d58; --err:#d93025;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans","Noto Sans JP","Noto Sans Myanmar","Noto Sans Khmer","Noto Sans Devanagari",sans-serif;
    -webkit-text-size-adjust:100%;line-height:1.6}
  .wrap{max-width:520px;margin:0 auto;padding:16px 14px 60px}
  .langbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .langbar button{border:1px solid var(--line);background:#fff;color:var(--sub);
    padding:6px 10px;border-radius:999px;font-size:13px;cursor:pointer}
  .langbar button.active{background:var(--brand);border-color:var(--brand);color:#fff}
  h1{font-size:19px;margin:2px 0 16px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 15px;margin-bottom:14px}
  .card.dim{opacity:.45;pointer-events:none}
  .step{font-size:12px;color:var(--brand);font-weight:700;letter-spacing:.04em;margin-bottom:6px}
  label.lbl{display:block;font-weight:600;font-size:14px;margin-bottom:8px}
  input[type=date],select,textarea{width:100%;padding:12px;font-size:16px;
    border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink)}
  .dob{display:flex;align-items:center;gap:8px}
  .dob input{padding:12px;font-size:18px;text-align:center;border:1px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);width:100%}
  .dob input#dobY{flex:1.4}.dob input#dobM,.dob input#dobD{flex:1}
  .dob span{color:var(--sub);font-size:18px}
  textarea{min-height:76px;resize:vertical}
  .btn{width:100%;padding:13px;font-size:16px;font-weight:700;border:none;border-radius:10px;
    background:var(--brand);color:#fff;cursor:pointer;margin-top:12px}
  .btn:active{background:var(--brand-d)}
  .radios{display:flex;flex-direction:column;gap:8px}
  .radios label{display:flex;align-items:center;gap:10px;border:1px solid var(--line);
    border-radius:10px;padding:11px 12px;font-size:15px;cursor:pointer}
  .radios input{width:20px;height:20px;accent-color:var(--brand)}
  .photobtn{display:flex;align-items:center;justify-content:center;gap:8px;
    border:1px dashed var(--brand);color:var(--brand-d);background:#f2f7ff;
    border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer}
  .preview{margin-top:10px;text-align:center}
  .preview img{max-width:150px;max-height:190px;border-radius:10px;border:1px solid var(--line)}
  .preview .rdy{display:block;color:var(--ok);font-size:13px;margin-top:6px;font-weight:600}
  .btn.sub{background:#eef2f9;color:var(--brand-d)}
  .crop{margin-top:12px}
  .cropvp{position:relative;width:100%;max-width:300px;margin:0 auto;background:#000;
    border-radius:10px;overflow:hidden;touch-action:none;user-select:none}
  .cropvp canvas{display:block;width:100%;height:100%}
  .guide{position:absolute;inset:0;pointer-events:none}
  .zoomrow{display:flex;align-items:center;gap:10px;max-width:360px;margin:10px auto 0;font-size:16px}
  .zoomrow input{flex:1}
  .croplbl{text-align:center;font-size:13px;color:var(--sub);margin-top:8px}
  .cropbtns{display:flex;gap:8px;max-width:360px;margin:10px auto 0}
  .cropbtns .btn{margin-top:0;flex:1}
  .msg{font-size:13px;margin-top:8px;min-height:18px}
  .msg.err{color:var(--err)}
  .done{text-align:center;padding:26px 14px}
  .done .check{width:56px;height:56px;border-radius:50%;background:var(--ok);color:#fff;
    font-size:30px;line-height:56px;margin:0 auto 12px}
  .done h2{margin:0 0 10px;font-size:18px;color:var(--ok)}
  .done .idbox{display:inline-block;background:#f0f6ff;border:1px solid #cfe0ff;color:#155ac4;
    font-weight:700;border-radius:8px;padding:6px 14px;margin-top:8px;font-size:15px}
  .done #d_body{font-size:15px;line-height:1.7}
  .ssnote{margin-top:16px;background:#fff7e6;border:1px solid #ffe0a3;color:#8a5a00;
    border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.6}
  .hide{display:none}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid #cfd6e2;
    border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="langbar" id="langbar"></div>
  <h1 id="app_title">日本語試験 受験意思確認</h1>

  <!-- STEP 1: birthday -->
  <div class="card" id="card1">
    <div class="step">STEP 1</div>
    <label class="lbl" id="l_step1" for="dobY">生年月日を入力してください</label>
    <div class="dob">
      <input type="tel" id="dobY" maxlength="4" placeholder="YYYY" inputmode="numeric" autocomplete="off">
      <span>/</span>
      <input type="tel" id="dobM" maxlength="2" placeholder="MM" inputmode="numeric" autocomplete="off">
      <span>/</span>
      <input type="tel" id="dobD" maxlength="2" placeholder="DD" inputmode="numeric" autocomplete="off">
    </div>
    <button class="btn" id="btn_search">名前を表示する</button>
    <div class="msg" id="msg1"></div>
  </div>

  <!-- STEP 2: name -->
  <div class="card dim" id="card2">
    <div class="step">STEP 2</div>
    <label class="lbl" id="l_step2" for="name">お名前を選んでください</label>
    <select id="name"><option value=""></option></select>
  </div>

  <!-- STEP 3: exam details + photo -->
  <div class="card dim" id="card3">
    <div class="step">STEP 3</div>
    <label class="lbl" id="l_level">受験レベル</label>
    <select id="level">
      <option value="">—</option>
      <option value="N5">N5</option>
      <option value="N4">N4</option>
      <option value="N3">N3</option>
      <option value="N2">N2</option>
      <option value="N1">N1</option>
    </select>

    <label class="lbl" id="l_method" style="margin-top:16px">申し込み方法</label>
    <div class="radios" id="methodbox">
      <label><input type="radio" name="method" value="group"><span id="m_group">未来クリエイト協同組合（みらいくりえいと/Mirai Create）に団体申込を依頼する</span></label>
      <label><input type="radio" name="method" value="individual"><span id="m_individual">個人で申し込む</span></label>
    </div>

    <label class="lbl" id="l_photo" style="margin-top:16px">顔写真（本人確認用）※必須</label>
    <div class="photobtn" id="photobtn">📷 <span id="photo_pick">写真を選ぶ・撮影する</span></div>
    <input type="file" id="photo" accept="image/*" style="display:none">

    <div class="crop hide" id="cropStage">
      <div class="cropvp" id="cropvp">
        <canvas id="cropCanvas"></canvas>
        <svg class="guide" viewBox="0 0 300 400" preserveAspectRatio="none">
          <rect x="2" y="2" width="296" height="396" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
          <line x1="150" y1="0" x2="150" y2="400" stroke="rgba(255,255,255,.22)" stroke-width="1" stroke-dasharray="5 6"/>
          <ellipse cx="150" cy="150" rx="70" ry="95" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-dasharray="7 6"/>
          <path d="M70 400 C70 320 105 290 150 290 C195 290 230 320 230 400" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-dasharray="7 6"/>
        </svg>
      </div>
      <div class="zoomrow">🔍<input type="range" id="zoom" min="1" max="3" step="0.01" value="1"></div>
      <div class="croplbl" id="photo_guide">顔と肩を枠のガイドに合わせてください</div>
      <div class="cropbtns">
        <button class="btn sub" id="cropRetake"><span id="photo_retake">選び直す</span></button>
        <button class="btn" id="cropConfirm"><span id="photo_confirm">この写真で決定</span></button>
      </div>
    </div>

    <div class="preview hide" id="preview"><img id="prevImg" alt=""><span class="rdy" id="photo_ready">写真を選択しました</span></div>

    <label class="lbl" id="l_notes" style="margin-top:16px">連絡事項・特記事項（任意）</label>
    <textarea id="notes"></textarea>

    <button class="btn" id="btn_submit">この内容で申し込む</button>
    <div class="msg" id="msg3"></div>
  </div>

  <!-- DONE -->
  <div class="card hide" id="cardDone">
    <div class="done">
      <div class="check">✓</div>
      <h2 id="d_title">申し込みを受け付けました</h2>
      <div id="d_body"></div>
      <div class="idbox" id="d_id"></div>
      <div class="ssnote" id="d_note"></div>
    </div>
  </div>

</div>

<script src="config.js"></script>

    err:"មានបញ្ហាការតភ្ជាប់។ សូមព្យាយាមម្តងទៀត។",ss_note:"សូមថតអេក្រង់ (screenshot) ទុក",
    need:"សូមជ្រើសរើសកម្រិត វិធីចុះឈ្មោះ និងរូបថតមុខ។",searching:"កំពុងស្វែងរក…",sending:"កំពុងផ្ញើ…"},
  ne:{app_title:"जापानी भाषा परीक्षा — सहभागिता पुष्टि",l_step1:"कृपया आफ्नो जन्म मिति हाल्नुहोस्",btn_search:"नाम देखाउनुहोस्",
    l_step2:"कृपया आफ्नो नाम छान्नुहोस्",l_level:"परीक्षा तह",l_method:"आवेदन विधि",
    m_group:"未来クリエイト協同組合（みらいくりえいと/Mirai Create） लाई सामूहिक आवेदन गर्न अनुरोध गर्नुहोस्",m_individual:"व्यक्तिगत रूपमा आवेदन गर्नुहोस्",
    l_photo:"अनुहारको फोटो (पहिचान पुष्टि) * अनिवार्य",photo_pick:"फोटो छान्नुहोस् / खिच्नुहोस्",photo_ready:"फोटो छानियो",photo_guide:"अनुहार र काँधलाई फ्रेमको मार्गनिर्देशनमा मिलाउनुहोस्",photo_confirm:"यही फोटो प्रयोग गर्नुहोस्",photo_retake:"फेरि छान्नुहोस्",

    d_title:"आवेदन प्राप्त भयो",d_body:'"{name}" को आवेदन प्राप्त भयो। (तह: {level} / {method})',
    no_match:"मिल्ने व्यक्ति भेटिएन। कृपया जन्म मिति पुनः जाँच्नुहोस्।",
    err:"जडान त्रुटि भयो। कृपया फेरि प्रयास गर्नुहोस्।",ss_note:"कृपया यो स्क्रिन स्क्रिनसट लिएर सुरक्षित गर्नुहोस्",
    need:"कृपया तह, आवेदन विधि र अनुहारको फोटो सबै छान्नुहोस्।",searching:"खोज्दै…",sending:"पठाउँदै…"}
};
const LANGS=[["ja","日本語"],["vi","Tiếng Việt"],["id","Bahasa Indonesia"],["my","မြန်မာ"],["tl","Tagalog"],["km","ខ្មែរ"],["ne","नेपाली"]];

let curLang="ja", selectedId="", selectedName="", photoData="";
const $=id=>document.getElementById(id);

/* 言語バー */
const bar=$("langbar");
LANGS.forEach(([code,label])=>{
  const b=document.createElement("button");
  b.textContent=label; b.dataset.code=code;
  b.onclick=()=>applyLang(code);
  bar.appendChild(b);
});
function applyLang(code){
  curLang=code; const t=I18N[code];
  document.documentElement.lang=code;
  ["app_title","l_step1","btn_search","l_step2","l_level","l_method",
   "m_group","m_individual","l_photo","photo_pick","photo_ready",
   "photo_guide","photo_confirm","photo_retake",
   "l_notes","btn_submit","d_title"].forEach(k=>{ if($(k)) $(k).textContent=t[k]; });
  [...bar.children].forEach(b=>b.classList.toggle("active",b.dataset.code===code));
}
applyLang("ja");

/* 生年月日：3欄の自動移動＋組み立て */
function getDob(){
  const y=$("dobY").value.replace(/\D/g,''), m=$("dobM").value.replace(/\D/g,''), d=$("dobD").value.replace(/\D/g,'');
  if(y.length!==4 || !m || !d) return "";
  return y+"-"+("0"+m).slice(-2)+"-"+("0"+d).slice(-2);
}
(function(){
  const Y=$("dobY"), M=$("dobM"), D=$("dobD");
  [Y,M,D].forEach(el=>{ el.addEventListener("input",()=>{ el.value=el.value.replace(/\D/g,""); }); });
  Y.addEventListener("input",()=>{ if(Y.value.length>=4) M.focus(); });
  M.addEventListener("input",()=>{ if(M.value.length>=2) D.focus(); });
  M.addEventListener("keydown",e=>{ if(e.key==="Backspace"&&!M.value) Y.focus(); });
  D.addEventListener("keydown",e=>{ if(e.key==="Backspace"&&!D.value) M.focus(); });
})();

/* JSONP（検索用・GET） */
function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2);
    const s=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("timeout"));},15000);
    function cleanup(){try{delete window[cb];}catch(e){window[cb]=undefined;} s.remove(); clearTimeout(timer);}
    window[cb]=d=>{cleanup();resolve(d);};
    s.onerror=()=>{cleanup();reject(new Error("network"));};
    const qs=new URLSearchParams(Object.assign({},params,{callback:cb})).toString();
    s.src=GAS_URL+"?"+qs;
    document.body.appendChild(s);
  });
}

/* STEP1: 検索 */
$("btn_search").onclick=async()=>{
  const dob=getDob();
  const m1=$("msg1"); m1.className="msg"; m1.textContent="";
  if(!dob){m1.className="msg err";m1.textContent="—";return;}
  m1.innerHTML='<span class="spin"></span>'+I18N[curLang].searching;
  try{
    const r=await jsonp({action:"lookup",dob});
    if(!r.ok) throw new Error("server");
    const sel=$("name"); sel.innerHTML='<option value=""></option>';
    if(!r.people||!r.people.length){
      m1.className="msg err"; m1.textContent=I18N[curLang].no_match;
      $("card2").classList.add("dim"); $("card3").classList.add("dim"); return;
    }
    r.people.forEach(p=>{
      const o=document.createElement("option");
      o.value=p.id; o.textContent=p.name; o.dataset.lang=p.lang||"ja";
      sel.appendChild(o);
    });
    m1.textContent=""; $("card2").classList.remove("dim");
  }catch(e){ m1.className="msg err"; m1.textContent=I18N[curLang].err; }
};

/* STEP2: 名前選択 → 言語自動切替 */
$("name").onchange=()=>{
  const opt=$("name").selectedOptions[0];
  selectedId=$("name").value; selectedName=opt?opt.textContent:"";
  if(selectedId){
    const lang=opt.dataset.lang||"ja";
    if(I18N[lang]) applyLang(lang);
    $("card3").classList.remove("dim");
  }else{ $("card3").classList.add("dim"); }
};

/* 写真：選択→4:3トリミング（ガイド枠）→1200×900 JPEG */
const OUT_W=900, OUT_H=1200;
let cropImg=null, baseScale=1, cScale=1, offX=0, offY=0, vpW=0, vpH=0, cdrag=null;

$("photobtn").onclick=()=>$("photo").click();
$("photo").onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{ const img=new Image(); img.onload=()=>{ cropImg=img; openCrop(); }; img.src=ev.target.result; };
  rd.readAsDataURL(f);
  e.target.value="";
};

function openCrop(){
  $("preview").classList.add("hide");
  $("cropStage").classList.remove("hide");
  const vp=$("cropvp"), cvs=$("cropCanvas");
  vpW=vp.clientWidth; vpH=Math.round(vpW*4/3);
  vp.style.height=vpH+"px"; cvs.width=vpW; cvs.height=vpH;
  baseScale=Math.max(vpW/cropImg.width, vpH/cropImg.height);
  cScale=baseScale; $("zoom").value=1;
  offX=(vpW-cropImg.width*cScale)/2; offY=(vpH-cropImg.height*cScale)/2;
  drawCrop();
}
function clampOff(){
  const w=cropImg.width*cScale, h=cropImg.height*cScale;
  offX=Math.min(0, Math.max(vpW-w, offX));
  offY=Math.min(0, Math.max(vpH-h, offY));
}
function drawCrop(){
  const ctx=$("cropCanvas").getContext("2d");
  clampOff();
  ctx.fillStyle="#000"; ctx.fillRect(0,0,vpW,vpH);
  ctx.drawImage(cropImg, offX, offY, cropImg.width*cScale, cropImg.height*cScale);
}
$("zoom").oninput=()=>{
  const cx=vpW/2, cy=vpH/2, prev=cScale, ns=baseScale*parseFloat($("zoom").value);
  offX=cx-(cx-offX)*(ns/prev); offY=cy-(cy-offY)*(ns/prev); cScale=ns; drawCrop();
};
(function(){
  const vp=$("cropvp");
  vp.addEventListener("pointerdown",e=>{ cdrag={x:e.clientX,y:e.clientY,ox:offX,oy:offY}; vp.setPointerCapture(e.pointerId); });
  vp.addEventListener("pointermove",e=>{ if(!cdrag)return; offX=cdrag.ox+(e.clientX-cdrag.x); offY=cdrag.oy+(e.clientY-cdrag.y); drawCrop(); });
  vp.addEventListener("pointerup",()=>cdrag=null);
  vp.addEventListener("pointercancel",()=>cdrag=null);
})();
$("cropRetake").onclick=()=>{ $("cropStage").classList.add("hide"); $("photo").click(); };
$("cropConfirm").onclick=()=>{
  const sx=(0-offX)/cScale, sy=(0-offY)/cScale, sW=vpW/cScale, sH=vpH/cScale;
  const oc=document.createElement("canvas"); oc.width=OUT_W; oc.height=OUT_H;
  oc.getContext("2d").drawImage(cropImg, sx, sy, sW, sH, 0,0,OUT_W,OUT_H);
  let q=0.92, url=oc.toDataURL("image/jpeg",q);
  while(url.length>7000000 && q>0.4){ q-=0.08; url=oc.toDataURL("image/jpeg",q); }
  photoData=url;
  $("cropStage").classList.add("hide");
  $("prevImg").src=url; $("preview").classList.remove("hide");
};

/* STEP3: 送信（POST・写真あり） */
$("btn_submit").onclick=async()=>{
  const m3=$("msg3"); m3.className="msg"; m3.textContent="";
  const level=$("level").value;
  const method=(document.querySelector('input[name=method]:checked')||{}).value;
  const notes=$("notes").value.trim();
  const dob=getDob();
  if(!selectedId||!level||!method||!photoData){ m3.className="msg err"; m3.textContent=I18N[curLang].need; return; }
  m3.innerHTML='<span class="spin"></span>'+I18N[curLang].sending;
  try{
    await fetch(GAS_URL,{method:"POST",mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"submit",id:selectedId,name:selectedName,dob,level,method,notes,lang:curLang,photo:photoData})});
    const t=I18N[curLang], ja=I18N.ja, biL=(curLang!=="ja");
    const esc=x=>String(x).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const ml=method==="group"?t.m_group:t.m_individual;
    const mlJa=method==="group"?ja.m_group:ja.m_individual;
    const fill=(tpl,m)=>tpl.replace("{name}",selectedName).replace("{level}",level).replace("{method}",m);
    $("d_title").textContent = biL ? (ja.d_title+" / "+t.d_title) : ja.d_title;
    $("d_body").innerHTML = esc(fill(ja.d_body,mlJa)) + (biL ? "<br>"+esc(fill(t.d_body,ml)) : "");
    $("d_note").innerHTML = esc(ja.ss_note) + (biL ? "<br>"+esc(t.ss_note) : "");
    $("d_id").textContent="管理番号 / ID "+selectedId;
    $("card1").classList.add("hide");$("card2").classList.add("hide");$("card3").classList.add("hide");
    $("cardDone").classList.remove("hide");
    window.scrollTo({top:0,behavior:"smooth"});
  }catch(e){ m3.className="msg err"; m3.textContent=I18N[curLang].err; }
};
</script>
